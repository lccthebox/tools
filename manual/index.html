<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#ffffff">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="THE BOX 매뉴얼">
<title>THE BOX · 매니저 매뉴얼</title>
<style>
/* ============================================================
   THE BOX MANAGER MANUAL — v3  "검색 우선"
   평소엔 검색창 + 제목 목록만. 치면 좁혀지고, 고르면 펼쳐짐.
   색·격자·장식 없음. 흑백 + 한 줄짜리 강조색만.
   ============================================================ */
:root{
  --bg:#ffffff;
  --ink:#16181d;
  --ink-2:#41464e;
  --ink-3:#767c85;
  --ink-4:#a4a9b2;
  --line:#ececef;
  --line-2:#dcdee2;
  --hover:#f6f6f8;
  --accent:#c2410c;
  --accent-soft:#fbf0ea;
  --hl:#ffe9a8;
  --r:12px;
  --sans:-apple-system,BlinkMacSystemFont,"Pretendard","Apple SD Gothic Neo","Malgun Gothic",sans-serif;
  --mono:"SF Mono",ui-monospace,Menlo,Consolas,monospace;
}
*{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{font-family:var(--sans);background:var(--bg);color:var(--ink);
  font-size:16px;line-height:1.7;-webkit-font-smoothing:antialiased}
@media(prefers-reduced-motion:reduce){*{animation:none!important;transition:none!important}}

/* GATE */
#gate{position:fixed;inset:0;z-index:1000;background:var(--bg);
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;padding:24px}
#gate .brand{font-family:var(--mono);letter-spacing:.2em;font-size:12px;color:var(--accent);font-weight:700}
#gate h1{font-size:23px;font-weight:800;letter-spacing:-.02em}
#gate p{color:var(--ink-3);font-size:15px;text-align:center}
#gate .box{display:flex;gap:8px;margin-top:4px}
#gate input{font-family:var(--mono);font-size:17px;letter-spacing:.12em;text-align:center;
  padding:13px 18px;border:2px solid var(--line-2);border-radius:11px;background:#fff;width:200px;outline:none}
#gate input:focus{border-color:var(--accent)}
#gate button{padding:13px 22px;border:none;border-radius:11px;background:var(--ink);color:#fff;
  font-size:15px;font-weight:700;cursor:pointer}
#gate button:hover{background:var(--accent)}
#gate .err{color:var(--accent);font-size:14px;height:18px;font-weight:500}

/* WRAP */
.wrap{max-width:760px;margin:0 auto;padding:0 24px}

/* TOP / SEARCH */
.top{padding:54px 0 22px;text-align:center}
.top .ey{font-family:var(--mono);font-size:12px;letter-spacing:.18em;color:var(--ink-4);font-weight:700}
.top h1{font-size:27px;font-weight:800;letter-spacing:-.03em;margin:10px 0 26px}

.searchbox{position:sticky;top:0;z-index:50;background:var(--bg);padding:14px 0;margin-bottom:4px}
.search{position:relative}
.search input{width:100%;font-size:18px;padding:17px 50px 17px 52px;border:2px solid var(--line-2);
  border-radius:14px;background:#fff;outline:none;color:var(--ink);transition:border-color .15s,box-shadow .15s}
.search input:focus{border-color:var(--accent);box-shadow:0 0 0 4px var(--accent-soft)}
.search input::placeholder{color:var(--ink-4);font-weight:400}
.search .ico{position:absolute;left:18px;top:50%;transform:translateY(-50%);color:var(--ink-3);font-size:20px;pointer-events:none}
.search .clr{position:absolute;right:14px;top:50%;transform:translateY(-50%);border:none;background:var(--line);
  color:var(--ink-3);width:26px;height:26px;border-radius:50%;cursor:pointer;font-size:14px;display:none;line-height:1}
.search .clr:hover{background:var(--line-2)}
.search.has .clr{display:flex;align-items:center;justify-content:center}
.meta{display:flex;justify-content:space-between;align-items:center;margin-top:11px;padding:0 2px}
.meta .c{font-family:var(--mono);font-size:12px;color:var(--ink-4)}
.meta .foldall{border:1px solid var(--line-2);background:#fff;color:var(--ink-3);font-family:var(--sans);
  font-size:12.5px;font-weight:600;padding:5px 12px;border-radius:8px;cursor:pointer;transition:all .12s}
.meta .foldall:hover{border-color:var(--accent);color:var(--accent);background:var(--accent-soft)}

/* LIST */
main{padding-bottom:120px}
.glabel{display:flex;align-items:center;gap:10px;font-family:var(--mono);font-size:12px;letter-spacing:.1em;
  color:var(--ink-3);font-weight:700;text-transform:uppercase;padding:16px 8px;cursor:pointer;
  border-bottom:1px solid var(--line);user-select:none;transition:background .12s}
.glabel:hover{background:var(--hover);color:var(--ink)}
.glabel .gchev{font-size:12px;color:var(--ink-4);transition:transform .18s;width:12px;text-align:center}
.grp.collapsed .glabel .gchev{transform:rotate(-90deg)}
.glabel .gname{flex:1;letter-spacing:.06em}
.glabel .gcount{font-family:var(--mono);font-size:11px;color:var(--ink-4);background:var(--hover);
  border:1px solid var(--line);border-radius:20px;padding:1px 8px;letter-spacing:0;text-transform:none}
.grp.collapsed .items{display:none}

.item{border-bottom:1px solid var(--line)}
.item .q{display:flex;align-items:center;gap:13px;padding:17px 8px;cursor:pointer;user-select:none}
.item .q:hover{background:var(--hover)}
.item .chev{color:var(--ink-4);font-size:13px;transition:transform .18s;width:13px;flex-shrink:0;text-align:center}
.item.open .chev{transform:rotate(90deg);color:var(--accent)}
.item .qt{flex:1;font-size:16.5px;font-weight:600;letter-spacing:-.01em;color:var(--ink)}
.item .tag{font-family:var(--mono);font-size:11px;color:var(--ink-4);background:var(--hover);
  border:1px solid var(--line);border-radius:6px;padding:2px 8px;white-space:nowrap;flex-shrink:0}
@media(max-width:480px){.item .q{flex-wrap:wrap}}

.item .a{display:none;padding:2px 8px 22px 34px}
.item.open .a{display:block;animation:fade .18s ease}
@keyframes fade{from{opacity:0;transform:translateY(-3px)}to{opacity:1;transform:none}}

.a ol{list-style:none;counter-reset:s;margin:0}
.a ol li{counter-increment:s;position:relative;padding:5px 0 5px 30px;font-size:15.5px;color:var(--ink-2);line-height:1.65}
.a ol li::before{content:counter(s) ".";position:absolute;left:0;top:5px;font-family:var(--mono);
  font-size:14px;font-weight:700;color:var(--accent)}
.a ul{list-style:none;margin:0}
.a ul li{position:relative;padding:5px 0 5px 18px;font-size:15.5px;color:var(--ink-2);line-height:1.65}
.a ul li::before{content:"–";position:absolute;left:2px;top:5px;color:var(--ink-4);font-weight:700}
.a strong{color:var(--ink);font-weight:700}
.a a{color:var(--accent);font-weight:600;text-decoration:underline;text-underline-offset:2px}
.a .note{margin-top:12px;background:var(--accent-soft);border-left:3px solid var(--accent);
  border-radius:0 8px 8px 0;padding:10px 14px;font-size:14px;color:#7a3208;line-height:1.6}
.a .note b{font-weight:700}

/* EMPTY */
#empty{display:none;text-align:center;padding:80px 20px;color:var(--ink-4)}
#empty .big{font-size:44px;margin-bottom:12px;opacity:.35}
#empty p{font-size:16px;font-weight:500}
.hl{background:var(--hl);border-radius:3px;padding:0 2px}

footer{max-width:760px;margin:0 auto;padding:24px;border-top:1px solid var(--line);
  display:flex;justify-content:space-between;flex-wrap:wrap;gap:8px;color:var(--ink-4);font-size:12px}
footer span{font-family:var(--mono)}

/* ============================================================
   MOBILE — 손가락 터치 / iOS 확대 방지 / 좁은 화면 여백
   ============================================================ */
@media(max-width:560px){
  body{font-size:15.5px}
  .wrap{padding:0 16px}

  /* 상단 여백 줄이고 검색창 빠르게 도달 */
  .top{padding:28px 0 14px}
  .top .ey{font-size:11px}
  .top h1{font-size:22px;margin:8px 0 16px}

  /* 검색창: iOS는 input 16px 미만이면 자동 확대됨 → 16px 유지 */
  .searchbox{padding:10px 0;
    /* 노치 영역 회피 */
    padding-top:max(10px,env(safe-area-inset-top))}
  .search input{font-size:16px;padding:15px 46px 15px 46px;border-radius:12px}
  .search .ico{left:15px;font-size:18px}
  .search .clr{width:30px;height:30px}  /* 터치 타깃 키움 */

  .meta{margin-top:9px}
  .meta .foldall{padding:7px 14px;font-size:13px}  /* 버튼 터치 영역 */

  /* 그룹 헤더: 터치하기 좋게 키움 */
  .glabel{padding:15px 6px;font-size:12px}
  .glabel .gchev{font-size:13px}

  /* 항목: 줄 간격·터치 영역 확대, 태그는 아래로 */
  .item .q{padding:16px 4px;gap:11px;flex-wrap:wrap}
  .item .qt{font-size:16px;flex:1 1 auto;min-width:0}
  .item .tag{display:inline-block;order:3;flex-basis:100%;margin-left:24px;
    width:fit-content;font-size:10.5px}
  .item .chev{font-size:14px}

  /* 펼친 내용 */
  .item .a{padding:2px 4px 20px 26px}
  .a ol li,.a ul li{font-size:15px;padding-top:6px;padding-bottom:6px}  /* 줄 간격 ↑ 가독성 */
  .a .note{font-size:13.5px;padding:11px 13px}

  footer{padding:20px 16px;padding-bottom:max(20px,env(safe-area-inset-bottom));font-size:11px}

  /* 게이트 입력도 16px 유지 */
  #gate input{font-size:16px}
  #gate h1{font-size:21px}
}

/* 아주 좁은 화면 (소형 폰) */
@media(max-width:360px){
  .wrap{padding:0 12px}
  .top h1{font-size:20px}
  .glabel .gname{letter-spacing:.03em}
}

/* 터치 기기: hover 잔상 제거 (모바일에서 hover 배경이 눌린 채 남는 문제) */
@media(hover:none){
  .glabel:hover{background:transparent;color:var(--ink-3)}
  .item .q:hover{background:transparent}
  .meta .foldall:hover{border-color:var(--line-2);color:var(--ink-3);background:#fff}
  .glabel:active{background:var(--hover)}
  .item .q:active{background:var(--hover)}
}
</style>
</head>
<body>

<div id="gate">
  <span class="brand">THE BOX · INTERNAL</span>
  <h1>매니저 매뉴얼</h1>
  <p>내부 직원용입니다. 접속 코드를 입력하세요.</p>
  <div class="box">
    <input id="code" type="password" inputmode="numeric" placeholder="••••" autocomplete="off" maxlength="12">
    <button onclick="tryUnlock()">입장</button>
  </div>
  <div class="err" id="err"></div>
</div>

<div class="wrap">
  <div class="top">
    <span class="ey">THE BOX MANUAL</span>
    <h1>매니저 매뉴얼</h1>
  </div>

  <div class="searchbox">
    <div class="search" id="searchWrap">
      <span class="ico">⌕</span>
      <input id="q" type="text" placeholder="찾을 내용을 입력하세요  —  환불, 홀딩, 청강, ㅎㄷ…" autocomplete="off">
      <button class="clr" onclick="clearSearch()" aria-label="지우기">✕</button>
    </div>
    <div class="meta">
      <span class="c" id="count"></span>
      <button class="foldall" id="foldBtn" onclick="toggleAll()">전체 접기</button>
    </div>
  </div>

  <main>
    <div id="list"></div>
    <div id="empty">
      <div class="big">⌕</div>
      <p>검색 결과가 없어요. 다른 키워드로 찾아보세요.</p>
    </div>
  </main>
</div>

<footer>
  <span>THE BOX MANUAL · v3.0</span>
  <span id="rev">최종 수정 2026-06-24</span>
</footer>

<script>
/* ===== ACCESS CODE — 이 한 줄만 교체 ===== */
const ACCESS_CODE = "1234";

function tryUnlock(){
  const v=document.getElementById('code').value.trim();
  if(v===ACCESS_CODE){sessionStorage.setItem('box_ok','1');document.getElementById('gate').style.display='none';document.getElementById('q').focus();}
  else{document.getElementById('err').textContent='코드가 올바르지 않습니다.';document.getElementById('code').value='';}
}
document.getElementById('code').addEventListener('keydown',e=>{if(e.key==='Enter')tryUnlock()});
if(sessionStorage.getItem('box_ok')==='1') document.getElementById('gate').style.display='none';

/* ============================================================
   CONTENT  ←←← 내용은 전부 여기 DATA 안에서만 입력
   ------------------------------------------------------------
   복붙용 빈 템플릿:
   {
     group:"묶음 이름",
     when:"라벨",                 // 오른쪽 작은 태그 (없으면 생략 가능)
     title:"항목 제목",
     tags:["검색키워드1","키워드2"],
     steps:["첫 단계","둘째 단계"],  // 2개 이상이면 번호, 1개면 그냥 문장
     notes:["주의·예시. 없으면 notes:[]"]
   },
   ※ 순서가 아닌 목록(예: 선생님별·주문처별)은 list:"bullet" 추가 → 번호 대신 불릿
   규칙: 큰따옴표 " " / 줄·항목 끝 쉼표 ,
   ============================================================ */
const DATA = [
  /* ===== 등록 · 결제 ===== */
  {
    group:"등록 · 결제",
    when:"신규",
    title:"신규 학생 기본 등록 절차",
    tags:["신규","등록","시트","안내톡","상담"],
    steps:[
      "시트 입력",
      "상담자 안내톡 전송",
      "담당 선생님 안내톡 전송"
    ],
    notes:["입력할 시트: ① N월 스케줄  ② N월 결제시트  ③ N월 상담시트"]
  },
  {
    group:"등록 · 결제",
    when:"리뷰할인",
    title:"신규 리뷰 할인 시 결제 금액 작성법",
    tags:["리뷰할인","신규","결제시트","비고","원금액"],
    steps:[
      "최초 신규는 5,000원 할인 결제를 해준다",
      "단, 결제시트에는 할인된 금액이 아니라 원금액 그대로 적는다",
      "비고란에 '리뷰할인'이라고 남긴다"
    ],
    notes:["예) 290,000원 수업을 리뷰할인 5,000원 적용해 285,000원으로 결제받은 경우 → 결제시트에는 <strong>290,000원</strong> 입력, 비고란에는 <strong>'리뷰할인'</strong>만 기재."]
  },
  {
    group:"등록 · 결제",
    when:"복귀할인",
    title:"복귀 시 리뷰 할인 처리",
    tags:["복귀","리뷰할인","연장","결제시트"],
    steps:[
      "연장과 동일하게 적용한다",
      "결제시트에 5,000원 할인된 금액 그대로 적어준다"
    ],
    notes:["신규(원금액 기재)와 반대입니다. 복귀·연장은 <strong>할인된 금액</strong>을 그대로 적습니다."]
  },
  {
    group:"등록 · 결제",
    when:"리뷰이벤트",
    title:"리뷰 이벤트 참가 자격",
    tags:["리뷰","이벤트","미작성","참가불가"],
    steps:[
      "리뷰 미작성으로 확인되면, 다음 리뷰 이벤트 참가 불가"
    ],
    notes:[]
  },
  {
    group:"등록 · 결제",
    when:"지인할인",
    title:"지인 할인",
    tags:["지인","할인","첫달","1만원"],
    steps:[
      "최초 첫 달 할인 가능",
      "N명이 등록해도 첫 달 최대 1만원 할인"
    ],
    notes:["여러 명이 등록해도 할인은 첫 달 1만원이 상한입니다."]
  },

  /* ===== 수업 관리 ===== */
  {
    group:"수업 관리",
    when:"홀딩",
    title:"수업 홀딩(일시정지) 처리",
    tags:["홀딩","일시정지","소멸","3개월","안내"],
    steps:[
      "홀딩 가능한 최장 기간은 3개월",
      "3개월이 지난 수업권은 자동 소멸 (담당 선생님의 예외 처리 제외)",
      "학생이 홀딩하는 시점에 반드시 최장 기간 안내를 보낸다"
    ],
    notes:["최장 기간 안내 누락 시 분쟁이 생길 수 있습니다. 홀딩 접수 즉시 안내톡 발송."]
  },
  {
    group:"수업 관리",
    when:"홀딩신청서",
    title:"홀딩 신청서 접수·보관",
    tags:["홀딩","신청서","pdf","드라이브","상담시트"],
    steps:[
      "더박스 홀딩 신청서 받기",
      "홀딩 내용을 담당 선생님께 확인",
      "홀딩 날짜(일수) 확인 후 PDF로 보냄",
      "기재 내용 받아 확인",
      "드라이브 상담시트 > 홀딩신청서 폴더에 보관"
    ],
    notes:[]
  },
  {
    group:"수업 관리",
    when:"교차수강",
    title:"원어민 회화스터디 교차수강 처리",
    tags:["교차수강","교대근무","오전","오후","요일","비고"],
    steps:[
      "교대 근무자는 비고란에 반드시 '교대근무'라고 작성",
      "오전·오후 교차가 필요하면, 매 주초마다 요일별 참석 시간대를 사전 안내·고지 (필수)",
      "주 1회인 경우, 같은 그룹이면 사전 고지 시 다른 요일 참석 가능"
    ],
    notes:["같은 그룹 한정으로만 교차 가능. 예) 월요일 참가자 → <strong>수요일 참석 가능</strong> / 월요일 참가자 → <strong>목요일 참석 불가</strong> (다른 그룹)."]
  },
  {
    group:"수업 관리",
    when:"아카데미홀딩",
    title:"아카데미 홀딩 처리 (선생님 컨펌 필수)",
    tags:["아카데미","홀딩","선생님","컨펌","출결","6층"],
    steps:[
      "선생님과 먼저 상의가 되어야 한다는 점을 학생에게 명확히 설명",

/* ============================================================
   RENDER + SEARCH
   ============================================================ */
const CHO=["ㄱ","ㄲ","ㄴ","ㄷ","ㄸ","ㄹ","ㅁ","ㅂ","ㅃ","ㅅ","ㅆ","ㅇ","ㅈ","ㅉ","ㅊ","ㅋ","ㅌ","ㅍ","ㅎ"];
function toCho(s){let r="";for(const ch of s){const c=ch.charCodeAt(0)-44032;r+=(c>=0&&c<11172)?CHO[Math.floor(c/588)]:ch;}return r;}
function blob(it){return it.title+" "+(it.when||"")+" "+it.tags.join(" ")+" "+it.steps.join(" ")+" "+(it.notes||[]).join(" ")+" "+it.group;}
function stripTags(s){return s.replace(/<[^>]+>/g,"");}

const ORDER=[];
DATA.forEach((it,i)=>{it._id="i"+i;if(!ORDER.includes(it.group))ORDER.push(it.group);});

function itemHTML(it){
  const multi=it.steps.length>1 && it.list!=="bullet";
  const steps=it.steps.map(s=>`<li>${s}</li>`).join("");
  const list=multi?`<ol>${steps}</ol>`:`<ul>${steps}</ul>`;
  const note=(it.notes&&it.notes.length&&it.notes[0])?`<div class="note">${it.notes[0]}</div>`:"";
  const tag=it.when?`<span class="tag">${it.when}</span>`:"";
  return `<div class="item" id="${it._id}" data-blob="${stripTags(blob(it)).replace(/"/g,'&quot;')}">
    <div class="q" onclick="toggle('${it._id}')">
      <span class="chev">▸</span>
      <span class="qt">${it.title}</span>
      ${tag}
    </div>
    <div class="a">${list}${note}</div>
  </div>`;
}

function render(){
  const list=document.getElementById('list');
  list.innerHTML=ORDER.map((g,gi)=>{
    const groupItems=DATA.filter(it=>it.group===g);
    const items=groupItems.map(itemHTML).join("");
    return `<section class="grp" data-group="${g}" id="grp${gi}">
      <div class="glabel" onclick="toggleGroup('grp${gi}')">
        <span class="gchev">▾</span>
        <span class="gname">${g}</span>
        <span class="gcount">${groupItems.length}</span>
      </div>
      <div class="items">${items}</div>
    </section>`;
  }).join("");
  updateCount(DATA.length);
}
render();

function toggleGroup(id){document.getElementById(id).classList.toggle('collapsed')}

let allCollapsed=false;
function toggleAll(){
  allCollapsed=!allCollapsed;
  document.querySelectorAll('.grp').forEach(sec=>sec.classList.toggle('collapsed',allCollapsed));
  // 그룹을 접을 땐 안에서 펼쳐둔 항목도 함께 접기
  if(allCollapsed) document.querySelectorAll('.item.open').forEach(it=>it.classList.remove('open'));
  document.getElementById('foldBtn').textContent=allCollapsed?'전체 펼치기':'전체 접기';
}

function toggle(id){document.getElementById(id).classList.toggle('open')}

const qInput=document.getElementById('q');
const searchWrap=document.getElementById('searchWrap');
function applyFilter(){
  const raw=qInput.value.trim();
  searchWrap.classList.toggle('has',!!raw);
  const isCho=/^[ㄱ-ㅎ]+$/.test(raw);
  const q=raw.toLowerCase(), qCho=toCho(raw);
  let shown=0;

  document.querySelectorAll('.item').forEach(it=>{
    let hit=true;
    if(raw){
      const b=it.dataset.blob.toLowerCase(), bCho=toCho(it.dataset.blob);
      hit = isCho ? bCho.includes(qCho) : (b.includes(q)||bCho.includes(qCho));
    }
    it.style.display=hit?'':'none';
    if(hit){
      shown++;
      // 검색 중이면 자동으로 펼치기, 비우면 다시 접기
      if(raw) it.classList.add('open'); else it.classList.remove('open');
      highlight(it,raw,isCho);
    }else{it.classList.remove('open');unhl(it);}
  });
  document.querySelectorAll('.grp').forEach(sec=>{
    const any=[...sec.querySelectorAll('.item')].some(i=>i.style.display!=='none');
    sec.style.display=any?'':'none';
    // 검색 중이면 그룹을 강제로 펼쳐서 결과가 보이게, 끝나면 원래 접힘 상태 복원
    if(raw) sec.classList.remove('collapsed');
    else if(allCollapsed) sec.classList.add('collapsed');
  });
  document.getElementById('empty').style.display=shown?'none':'block';
  updateCount(shown);
}
function updateCount(n){document.getElementById('count').textContent=n+'개 항목';}

function highlight(item,term,isCho){
  unhl(item);
  if(!term||isCho)return;
  const qt=item.querySelector('.qt');const t=qt.textContent;
  const i=t.toLowerCase().indexOf(term.toLowerCase());
  if(i>=0)qt.innerHTML=t.slice(0,i)+'<span class="hl">'+t.slice(i,i+term.length)+'</span>'+t.slice(i+term.length);
}
function unhl(item){const qt=item.querySelector('.qt');if(qt.querySelector('.hl'))qt.textContent=qt.textContent;}

qInput.addEventListener('input',applyFilter);
function clearSearch(){qInput.value='';applyFilter();qInput.focus();}
document.addEventListener('keydown',e=>{
  if(e.key==='/'&&document.activeElement!==qInput){e.preventDefault();qInput.focus();}
  if(e.key==='Escape'){clearSearch();qInput.blur();}
});
</script>
</body>
</html>
