<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>THE BOX 서류 발급</title>
<style>
  :root{
    --ink:#1a1d29; --paper:#fbfaf7; --line:#e3e0d8;
    --accent:#c8472e; --accent-soft:#f3e3df;
    --muted:#7a7668; --good:#2f7d54; --good-soft:#e3f1e9;
    --warn:#b8862a; --warn-soft:#f6edda;
    --shadow:0 1px 2px rgba(26,29,41,.04),0 8px 24px rgba(26,29,41,.06);
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{
    font-family:-apple-system,BlinkMacSystemFont,"Apple SD Gothic Neo","Malgun Gothic",sans-serif;
    background:var(--paper); color:var(--ink); line-height:1.55;
    -webkit-font-smoothing:antialiased;
  }
  .wrap{max-width:720px;margin:0 auto;padding:0 18px 80px}
  header.top{
    padding:28px 0 22px; border-bottom:1px solid var(--line);
    margin-bottom:26px; display:flex;align-items:baseline;gap:14px;flex-wrap:wrap;
  }
  .brand{font-size:22px;font-weight:800;letter-spacing:-.02em}
  .brand b{color:var(--accent)}
  .brand-sub{font-size:13px;color:var(--muted)}
  .tabs{display:flex;gap:6px;margin-bottom:24px;background:#f1efe9;padding:5px;border-radius:12px}
  .tabs button{
    flex:1;border:0;background:transparent;padding:10px;border-radius:8px;
    font-size:14px;font-weight:600;color:var(--muted);cursor:pointer;font-family:inherit;
  }
  .tabs button.on{background:#fff;color:var(--ink);box-shadow:var(--shadow)}
  .card{
    background:#fff;border:1px solid var(--line);border-radius:16px;
    padding:24px;box-shadow:var(--shadow);margin-bottom:18px;
  }
  h2{font-size:17px;font-weight:700;margin-bottom:4px}
  .hint{font-size:13px;color:var(--muted);margin-bottom:18px}
  label{display:block;font-size:13px;font-weight:600;margin:14px 0 6px}
  label .req{color:var(--accent)}
  input,select,textarea{
    width:100%;padding:11px 13px;border:1px solid var(--line);border-radius:10px;
    font-size:15px;font-family:inherit;background:#fcfcfb;color:var(--ink);
  }
  input:focus,select:focus,textarea:focus{outline:2px solid var(--accent-soft);border-color:var(--accent)}
  textarea{resize:vertical;min-height:72px}
  .grid2{display:grid;grid-template-columns:1fr 1fr;gap:0 14px}
  @media(max-width:520px){.grid2{grid-template-columns:1fr}}
  .doc-pick{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:6px}
  @media(max-width:520px){.doc-pick{grid-template-columns:1fr}}
  .doc-pick label{
    margin:0;display:flex;align-items:center;gap:9px;padding:13px;
    border:1px solid var(--line);border-radius:11px;cursor:pointer;font-weight:500;
    transition:.12s;
  }
  .doc-pick label:hover{border-color:var(--accent)}
  .doc-pick input{width:auto}
  .doc-pick label.sel{border-color:var(--accent);background:var(--accent-soft)}
  .fields{display:none;border-top:1px dashed var(--line);margin-top:18px;padding-top:8px}
  .fields.show{display:block}
  .btn{
    width:100%;border:0;background:var(--ink);color:#fff;padding:14px;
    border-radius:11px;font-size:15px;font-weight:700;cursor:pointer;
    font-family:inherit;margin-top:22px;transition:.12s;
  }
  .btn:hover{background:#000}
  .btn:disabled{opacity:.5;cursor:not-allowed}
  .btn.accent{background:var(--accent)}
  .btn.accent:hover{background:#a93a23}
  .msg{padding:13px 15px;border-radius:10px;font-size:14px;margin-top:16px;display:none}
  .msg.ok{display:block;background:var(--good-soft);color:var(--good)}
  .msg.err{display:block;background:var(--accent-soft);color:var(--accent)}
  /* admin */
  .row{
    display:flex;justify-content:space-between;align-items:flex-start;gap:12px;
    padding:16px;border:1px solid var(--line);border-radius:12px;margin-bottom:10px;background:#fff;
  }
  .row .meta{font-size:13px;color:var(--muted);margin-top:3px}
  .row .name{font-weight:700;font-size:15px}
  .pill{display:inline-block;font-size:11px;font-weight:700;padding:3px 9px;border-radius:20px;vertical-align:middle;margin-left:7px}
  .pill.wait{background:var(--warn-soft);color:var(--warn)}
  .pill.done{background:var(--good-soft);color:var(--good)}
  .row .acts{display:flex;flex-direction:column;gap:6px;flex-shrink:0}
  .row .acts button{
    border:1px solid var(--line);background:#fff;border-radius:8px;padding:7px 12px;
    font-size:13px;font-weight:600;cursor:pointer;font-family:inherit;white-space:nowrap;
  }
  .row .acts button.go{background:var(--accent);color:#fff;border-color:var(--accent)}
  .row .acts button:disabled{opacity:.5}
  .empty{text-align:center;color:var(--muted);padding:40px 0;font-size:14px}
  .lock{max-width:360px;margin:60px auto;text-align:center}
  .lock h2{margin-bottom:14px}
  .spin{display:inline-block;width:14px;height:14px;border:2px solid #fff5;border-top-color:#fff;border-radius:50%;animation:s .7s linear infinite;vertical-align:-2px;margin-right:6px}
  @keyframes s{to{transform:rotate(360deg)}}
  .foot{text-align:center;font-size:12px;color:var(--muted);margin-top:30px;line-height:1.7}
</style>
</head>
<body>
<div class="wrap">
  <header class="top">
    <div class="brand">THE <b>BOX</b> · 서류 발급</div>
    <div class="brand-sub">주식회사 더박스 · 대구 동성로</div>
  </header>

  <div class="tabs">
    <button id="tab-req" class="on" onclick="show('req')">서류 신청</button>
    <button id="tab-adm" onclick="show('adm')">관리자</button>
  </div>

  <!-- ================= 학생 신청 ================= -->
  <section id="view-req">
    <div class="card">
      <h2>서류 신청하기</h2>
      <p class="hint">필요한 서류를 선택하고 정보를 입력하면 관리자 확인 후 이메일로 보내드립니다.</p>

      <label>이름 <span class="req">*</span></label>
      <input id="r_name" placeholder="홍길동">

      <div class="grid2">
        <div>
          <label>생년월일 <span class="req">*</span></label>
          <input id="r_birth" type="date">
        </div>
        <div>
          <label>연락처 <span class="req">*</span></label>
          <input id="r_phone" placeholder="010-0000-0000" inputmode="tel">
        </div>
      </div>

      <label>이메일 <span class="req">*</span></label>
      <input id="r_email" placeholder="name@email.com" inputmode="email">

      <div class="grid2">
        <div>
          <label>강좌명 <span class="req">*</span></label>
          <input id="r_course" placeholder="예) 비즈니스 영어회화">
        </div>
        <div>
          <label>수강기간 <span class="req">*</span></label>
          <input id="r_period" placeholder="예) 2026.03.01 ~ 2026.06.30">
        </div>
      </div>

      <label>받을 서류 <span class="req">*</span> <span style="font-weight:400;color:var(--muted)">(복수 선택 가능)</span></label>
      <div class="doc-pick" id="docpick"></div>

      <!-- 동적 추가 필드 -->
      <div id="extra"></div>

      <label style="margin-top:18px">요청 메모 <span style="font-weight:400;color:var(--muted)">(선택)</span></label>
      <textarea id="r_memo" placeholder="원하시는 발급(수령) 날짜나 기타 요청사항이 있으면 적어주세요. 예) 6월 30일까지 필요, 제출처: ○○회사"></textarea>

      <button class="btn accent" id="r_submit" onclick="submitReq()">신청서 보내기</button>
      <div class="msg" id="r_msg"></div>
    </div>
    <div class="foot">
      주식회사 더박스 · 대표 정원철 · 755-86-01909<br>
      대구광역시 중구 동성로 2, 7·8층 (협성빌딩)
    </div>
  </section>

  <!-- ================= 관리자 ================= -->
  <section id="view-adm" style="display:none">
    <div id="adm-lock" class="card lock">
      <h2>관리자 인증</h2>
      <input id="a_pw" type="password" placeholder="관리자 비밀번호" onkeydown="if(event.key==='Enter')unlock()">
      <button class="btn" onclick="unlock()">들어가기</button>
      <div class="msg" id="a_msg"></div>
    </div>

    <div id="adm-panel" style="display:none">
      <div class="card">
        <div style="display:flex;justify-content:space-between;align-items:center">
          <h2 style="margin:0">신청 목록</h2>
          <button onclick="loadList()" style="border:1px solid var(--line);background:#fff;border-radius:8px;padding:7px 13px;font-size:13px;font-weight:600;cursor:pointer;font-family:inherit">새로고침</button>
        </div>
      </div>
      <div id="list"></div>
    </div>
  </section>
</div>

<script>
/* ====== 설정: 배포 후 본인 값으로 교체 ====== */
const GAS_URL = "https://script.google.com/macros/s/AKfycbzxy0o31Qx1No1CS5vheZZeaR0-YKJvXI9UNWO-HeW3CEUoiN0EltZPqPeCdUWbQjAI/exec";
/* ============================================ */

/* 공통 입력(이름·생년월일·강좌명·수강기간)은 상단에서 받고,
   여기 extra 는 서류별 고유 항목만. */
const DOCS = {
  enroll:   {label:"수강확인서",  extra:[]},
  attend:   {label:"출석확인서",  extra:[["출석 / 전체일수","attend"]]},
  hold:     {label:"수업 홀딩신청서",extra:[["홀딩 시작일","hold_from","date"],["홀딩 종료일","hold_to","date"],["사유","reason"]]},
  invoice:  {label:"수강료 청구서",extra:[["청구기간","period"],["청구금액(원)","amount"]]},
  cert:     {label:"수료증",      extra:[]},
  receipt:  {label:"영수증",      extra:[["결제금액(원)","amount"],["결제일","pay_date","date"],["결제수단","method"]]},
  bizreg:   {label:"사업자등록증", extra:[]},
};

/* 신청 화면 - 서류 체크박스 */
const pick = document.getElementById('docpick');
Object.entries(DOCS).forEach(([k,v])=>{
  const l=document.createElement('label');
  l.innerHTML=`<input type="checkbox" value="${k}" onchange="toggleDoc(this)"> ${v.label}`;
  pick.appendChild(l);
});

function toggleDoc(cb){
  cb.closest('label').classList.toggle('sel', cb.checked);
  renderExtra();
}

/* 선택된 서류별 추가 입력칸 */
function renderExtra(){
  const sel=[...document.querySelectorAll('#docpick input:checked')].map(c=>c.value);
  const box=document.getElementById('extra');
  box.innerHTML='';
  sel.forEach(k=>{
    const d=DOCS[k];
    if(!d.extra.length)return;
    const grp=document.createElement('div');
    grp.className='fields show';
    grp.innerHTML=`<div style="font-size:13px;font-weight:700;color:var(--accent);margin:6px 0 2px">${d.label} 정보</div>`;
    d.extra.forEach(([lab,name,type])=>{
      const id=`x_${k}_${name}`;
      grp.innerHTML+=`<label>${lab}</label><input id="${id}" type="${type||'text'}">`;
    });
    box.appendChild(grp);
  });
}

function submitReq(){
  const name=val('r_name'), birth=val('r_birth'), phone=val('r_phone'),
        email=val('r_email'), course=val('r_course'), period=val('r_period');
  const sel=[...document.querySelectorAll('#docpick input:checked')].map(c=>c.value);
  const msg=document.getElementById('r_msg');
  if(!name||!birth||!phone||!email){return flash(msg,'err','이름·생년월일·연락처·이메일을 모두 입력해 주세요.');}
  if(!course||!period){return flash(msg,'err','강좌명과 수강기간을 입력해 주세요.');}
  if(!/^[^@\s]+@[^@\s]+\.[^@\s]+$/.test(email)){return flash(msg,'err','이메일 형식을 확인해 주세요.');}
  if(!sel.length){return flash(msg,'err','받을 서류를 한 개 이상 선택해 주세요.');}

  const details={};
  sel.forEach(k=>{
    DOCS[k].extra.forEach(([lab,nm])=>{
      const el=document.getElementById(`x_${k}_${nm}`);
      if(el&&el.value) details[`${k}.${nm}`]=el.value;
    });
  });

  const payload={action:"request",name,birth,phone,email,course,period,
    docs:sel.map(k=>DOCS[k].label).join(", "),
    docKeys:sel.join(","),
    details:JSON.stringify(details),
    memo:val('r_memo')};

  const btn=document.getElementById('r_submit');
  btn.disabled=true; btn.innerHTML='<span class="spin"></span>보내는 중…';
  post(payload).then(r=>{
    if(r.ok){
      flash(msg,'ok','신청이 접수되었습니다. 확인 후 이메일로 보내드릴게요.');
      document.getElementById('view-req').querySelectorAll('input,textarea').forEach(e=>{if(e.type==='checkbox')e.checked=false;else e.value=''});
      document.querySelectorAll('#docpick label').forEach(l=>l.classList.remove('sel'));
      document.getElementById('extra').innerHTML='';
    }else flash(msg,'err',r.error||'전송에 실패했습니다.');
  }).catch(()=>flash(msg,'err','네트워크 오류가 발생했습니다.'))
    .finally(()=>{btn.disabled=false;btn.textContent='신청서 보내기';});
}

/* ====== 관리자 ====== */
let ADMIN_PW='';
function unlock(){
  const pw=val('a_pw'); const msg=document.getElementById('a_msg');
  if(!pw)return flash(msg,'err','비밀번호를 입력하세요.');
  ADMIN_PW=pw;
  post({action:"list",pw}).then(r=>{
    if(r.ok){document.getElementById('adm-lock').style.display='none';
      document.getElementById('adm-panel').style.display='block';
      renderList(r.rows);}
    else flash(msg,'err',r.error||'인증 실패');
  }).catch(()=>flash(msg,'err','네트워크 오류'));
}
function loadList(){
  post({action:"list",pw:ADMIN_PW}).then(r=>{if(r.ok)renderList(r.rows);});
}
function renderList(rows){
  const box=document.getElementById('list');
  if(!rows||!rows.length){box.innerHTML='<div class="card empty">아직 신청 내역이 없습니다.</div>';return;}
  box.innerHTML='';
  rows.slice().reverse().forEach(row=>{
    const done=row.status==='발급완료';
    const el=document.createElement('div');
    el.className='row';
    el.innerHTML=`
      <div>
        <div class="name">${esc(row.name)}
          <span class="pill ${done?'done':'wait'}">${done?'발급완료':'대기'}</span></div>
        <div class="meta">${esc(row.docs)}</div>
        <div class="meta">${esc(row.course||'')}${row.period?' · '+esc(row.period):''}</div>
        <div class="meta">${esc(row.email)} · ${esc(row.phone)}</div>
        <div class="meta">${esc(row.timestamp||'')}${row.memo?' · 메모: '+esc(row.memo):''}</div>
      </div>
      <div class="acts">
        <button class="go" ${done?'':''} onclick='issue(${JSON.stringify(row.rowIndex)},this)'>${done?'재발급':'발급·전송'}</button>
      </div>`;
    box.appendChild(el);
  });
}
function issue(rowIndex,btn){
  btn.disabled=true; const old=btn.textContent; btn.innerHTML='<span class="spin"></span>처리중';
  post({action:"issue",pw:ADMIN_PW,rowIndex}).then(r=>{
    if(r.ok){btn.textContent='완료'; loadList();}
    else{alert(r.error||'발급 실패');btn.disabled=false;btn.textContent=old;}
  }).catch(()=>{alert('네트워크 오류');btn.disabled=false;btn.textContent=old;});
}

/* ====== 공통 ====== */
function show(v){
  document.getElementById('view-req').style.display=v==='req'?'block':'none';
  document.getElementById('view-adm').style.display=v==='adm'?'block':'none';
  document.getElementById('tab-req').classList.toggle('on',v==='req');
  document.getElementById('tab-adm').classList.toggle('on',v==='adm');
}
function val(id){return document.getElementById(id).value.trim();}
function esc(s){return String(s||'').replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));}
function flash(el,cls,txt){el.className='msg '+cls;el.textContent=txt;}
function post(data){
  return fetch(GAS_URL,{method:'POST',body:JSON.stringify(data)})
    .then(r=>r.json());
}
</script>
</body>
</html>
