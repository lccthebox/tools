<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Box AI Master v5.0 - Error Fix</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        :root { --thebox-orange: #ff6b35; --naver-green: #03C75A; --bg: #f8f9fa; }
        body { font-family: 'Pretendard', sans-serif; background: var(--bg); margin: 0; display: flex; height: 100vh; color: #333; }
        .sidebar { width: 360px; background: white; border-right: 1px solid #eee; padding: 30px 20px; display: flex; flex-direction: column; overflow-y: auto; }
        .logo { font-size: 1.6rem; font-weight: 900; color: var(--thebox-orange); margin-bottom: 25px; }
        .tab-container { display: flex; gap: 8px; margin-bottom: 25px; background: #f0f0f0; padding: 5px; border-radius: 12px; }
        .tab { flex: 1; text-align: center; padding: 12px; border-radius: 8px; cursor: pointer; font-size: 0.85rem; font-weight: 700; color: #888; }
        .tab.active { background: white; color: var(--thebox-orange); box-shadow: 0 4px 10px rgba(0,0,0,0.05); }
        .idea-bank { background: #fff9f5; border: 1.5px solid #ffe8d9; border-radius: 15px; padding: 15px; margin-bottom: 20px; }
        .btn-idea { width: 100%; padding: 10px; background: white; border: 1px solid #ffe8d9; border-radius: 8px; font-weight: bold; cursor: pointer; }
        #ideaList { margin-top: 10px; display: flex; flex-wrap: wrap; gap: 6px; }
        .idea-tag { background: white; border: 1px solid #eee; padding: 6px 10px; border-radius: 6px; font-size: 0.75rem; cursor: pointer; }
        .input-group { margin-bottom: 20px; }
        input { width: 100%; padding: 14px; border: 2px solid #eee; border-radius: 12px; font-size: 0.95rem; box-sizing: border-box; }
        .btn-run { width: 100%; padding: 18px; background: var(--thebox-orange); color: white; border: none; border-radius: 12px; font-weight: 800; font-size: 1.1rem; cursor: pointer; }
        .main-content { flex: 1; padding: 40px; overflow-y: auto; background: #fff; }
        .card { background: white; padding: 35px; border-radius: 25px; border: 1px solid #f0f0f0; box-shadow: 0 10px 40px rgba(0,0,0,0.02); }
        #editor { min-height: 700px; line-height: 2.1; font-size: 1.15rem; outline: none; white-space: pre-wrap; }
        /* 에러 메시지 스타일 */
        #status { font-size: 0.85rem; padding: 15px; border-radius: 10px; margin-top: 20px; white-space: pre-wrap; word-break: break-all; display: none; }
        .img-slot { background: #f9fafc; border: 1.5px dashed #e0e0e0; padding: 40px; text-align: center; color: #888; margin: 30px 0; border-radius: 20px; }
    </style>
</head>
<body>

<div class="sidebar">
    <div class="logo">📦 THE BOX AI</div>
    <div class="tab-container">
        <div class="tab active" id="tabTheBox" onclick="switchTab('thebox')">더박스 모드</div>
        <div class="tab" id="tabGeneral" onclick="switchTab('general')">자유 키워드</div>
    </div>

    <div class="idea-bank">
        <h4>💡 아이디어 뱅크</h4>
        <button class="btn-idea" onclick="getKeywords()">✨ 오늘의 꿀키워드 추천받기</button>
        <div id="ideaList"></div>
    </div>

    <div class="input-group">
        <label>타겟 키워드</label>
        <input type="text" id="targetKeyword" placeholder="키워드를 입력하세요">
    </div>

    <button id="mainBtn" class="btn-run" onclick="generateContent()">원고 생성 시작</button>
    
    <div id="status"></div>
</div>

<div class="main-content">
    <div class="card">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom: 25px;">
            <h3>✍️ 리얼 원고 미리보기</h3>
            <button onclick="copyDraft()" style="background:#222; color:white; border:none; padding:10px 20px; border-radius:10px; cursor:pointer;">복사하기</button>
        </div>
        <div id="editor" contenteditable="true">키워드를 입력하고 생성을 눌러주세요.</div>
    </div>
</div>

<script>
    // 사용자님이 주신 키 (다시 한번 확인해 주세요!)
    const API_KEY = "AIzaSyD031G9zn3-zn3yAX0c7yFjhHwM5tyrenM";
    
    // 2026년 기준 모델명 후보들입니다. (첫 번째가 안되면 두 번째로 자동 시도함)
    const MODELS = ["gemini-1.5-flash", "gemini-2.0-flash", "gemini-pro"];
    let currentMode = 'thebox';

    function switchTab(mode) {
        currentMode = mode;
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        document.getElementById(mode === 'thebox' ? 'tabTheBox' : 'tabGeneral').classList.add('active');
        document.getElementById('mainBtn').style.background = mode === 'thebox' ? "#ff6b35" : "#03C75A";
    }

    // 공통 호출 함수 (에러 핸들링 강화)
    async function callGemini(prompt) {
        for (let model of MODELS) {
            try {
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/${model}:generateContent?key=${API_KEY}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ contents: [{ parts: [{ text: prompt }] }] })
                });
                const data = await response.json();
                
                if (data.error) {
                    console.error(`Model ${model} failed:`, data.error.message);
                    continue; // 다음 모델로 시도
                }
                return data.candidates[0].content.parts[0].text;
            } catch (e) {
                console.error(`Model ${model} fetch error:`, e);
            }
        }
        throw new Error("모든 모델 호출에 실패했습니다. API 키가 만료되었거나 권한이 없을 수 있습니다.");
    }

    async function getKeywords() {
        const ideaList = document.getElementById('ideaList');
        ideaList.innerHTML = "분석 중...";
        try {
            const prompt = "2026년 3월 한국 트렌드 반영, 네이버 블로그용 블루오션 키워드 8개 추천해줘. 콤마로만 구분해.";
            const res = await callGemini(prompt);
            const kws = res.split(',');
            ideaList.innerHTML = "";
            kws.forEach(k => {
                const s = document.createElement('span');
                s.className = 'idea-tag';
                s.innerText = k.trim();
                s.onclick = () => document.getElementById('targetKeyword').value = k.trim();
                ideaList.appendChild(s);
            });
        } catch (e) {
            ideaList.innerHTML = "로드 실패: " + e.message;
        }
    }

    async function generateContent() {
        const kw = document.getElementById('targetKeyword').value;
        const status = document.getElementById('status');
        const editor = document.getElementById('editor');

        if(!kw) return alert('키워드를 입력해 주세요!');

        status.style.display = 'block';
        status.style.background = '#f0f7ff';
        status.style.color = '#0056b3';
        status.innerHTML = "🌀 2026 로직 분석 및 원고 생성 중...";

        const prompt = currentMode === 'thebox'
            ? `너는 대구 '더박스' 영어회화 커뮤니티의 찐팬이야. [${kw}] 키워드로 '내돈내산' 후기 1,800자 써줘. 구어체 사용, 광고 말투 금지. ###원고 구분자 뒤에 작성해.`
            : `2030 파워블로거 말투로 [${kw}] 리얼 후기 1,800자 써줘. ###원고 구분자 뒤에 작성해.`;

        try {
            const res = await callGemini(prompt);
            const content = res.split('###원고')[1] || res;
            let formatted = content.trim().replace(/\n/g, '<br>');
            formatted = formatted.replace(/\[사진:.*?\]/g, m => `<div class="img-slot"><i class="fa-regular fa-image"></i><br>${m}</div>`);
            editor.innerHTML = formatted;
            status.style.background = '#f6ffed';
            status.style.color = '#389e0d';
            status.innerHTML = "✅ 생성 완료!";
        } catch (e) {
            status.style.background = '#fff1f0';
            status.style.color = '#cf1322';
            status.innerHTML = "❌ 에러: " + e.message;
        }
    }

    function copyDraft() {
        const editor = document.getElementById('editor');
        const range = document.createRange();
        range.selectNode(editor);
        window.getSelection().removeAllRanges();
        window.getSelection().addRange(range);
        document.execCommand('copy');
        alert('복사되었습니다!');
    }
</script>
</body>
</html>
