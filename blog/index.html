<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>THE BOX AI MASTER v11.0 (Zero-Repetition)</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        :root { --thebox: #ff6b35; --naver: #03C75A; --bg: #f0f2f5; }
        body { font-family: 'Pretendard', sans-serif; background: var(--bg); margin: 0; display: flex; height: 100vh; color: #1a1a1b; }
        
        /* Sidebar */
        .sidebar { width: 380px; background: white; border-right: 1px solid #e1e4e8; padding: 40px 25px; display: flex; flex-direction: column; overflow-y: auto; }
        .logo { font-size: 1.8rem; font-weight: 900; color: var(--thebox); letter-spacing: -1.5px; margin-bottom: 5px; }
        .tagline { font-size: 0.8rem; color: #999; margin-bottom: 30px; font-weight: 500; }
        
        .tab-container { display: flex; gap: 8px; margin-bottom: 25px; background: #eee; padding: 5px; border-radius: 14px; }
        .tab { flex: 1; text-align: center; padding: 12px; border-radius: 10px; cursor: pointer; font-size: 0.85rem; font-weight: 800; color: #888; }
        .tab.active { background: white; color: var(--thebox); box-shadow: 0 4px 10px rgba(0,0,0,0.05); }
        
        .idea-bank { background: #fffcf0; border: 1.5px solid #ffecb3; border-radius: 18px; padding: 20px; margin-bottom: 25px; }
        .btn-idea { width: 100%; padding: 14px; background: white; border: 1.5px solid #ffecb3; border-radius: 12px; color: #b7791f; font-weight: 800; cursor: pointer; font-size: 0.95rem; }
        #ideaList { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 15px; }
        .idea-tag { background: white; border: 1px solid #eee; padding: 8px 14px; border-radius: 10px; font-size: 0.8rem; cursor: pointer; font-weight: 600; }

        input[type="text"] { width: 100%; padding: 18px; border: 2.5px solid #eee; border-radius: 16px; font-size: 1rem; box-sizing: border-box; outline: none; margin-bottom: 20px; }
        input[type="text"]:focus { border-color: var(--thebox); }
        
        .btn-run { width: 100%; padding: 22px; background: var(--thebox); color: white; border: none; border-radius: 16px; font-weight: 900; font-size: 1.2rem; cursor: pointer; transition: 0.3s; box-shadow: 0 8px 20px rgba(255,107,53,0.25); }
        .btn-run:hover { transform: translateY(-4px); }

        /* Main Content */
        .main-content { flex: 1; padding: 50px; overflow-y: auto; background: #fff; }
        .editor-card { background: white; padding: 45px; border-radius: 35px; border: 1px solid #f0f1f3; box-shadow: 0 20px 60px rgba(0,0,0,0.03); }
        #editor { min-height: 800px; line-height: 2.3; font-size: 1.15rem; outline: none; white-space: pre-wrap; color: #2d3436; }
        
        /* Status UI */
        #status { font-size: 0.9rem; padding: 18px; border-radius: 14px; margin-top: 20px; display: none; font-weight: 600; }
        .naver-quote { border-left: 6px solid var(--naver); background: #f8f9fa; padding: 25px; margin: 35px 0; border-radius: 0 15px 15px 0; }
        .img-slot { background: #f8fafc; border: 2px dashed #e2e8f0; padding: 50px; text-align: center; color: #94a3b8; margin: 40px 0; border-radius: 24px; }
    </style>
</head>
<body>

<div class="sidebar">
    <div class="logo">🚀 THE BOX MASTER</div>
    <div class="tagline">Anti-Repetition AI Engine v11.0</div>
    
    <div class="tab-container">
        <div class="tab active" id="tabTheBox" onclick="switchTab('thebox')">더박스 모드</div>
        <div class="tab" id="tabGeneral" onclick="switchTab('general')">자유 키워드</div>
    </div>

    <div class="idea-bank">
        <button class="btn-idea" onclick="getKeywords()">💡 무작위 황금키워드 추천</button>
        <div id="ideaList"></div>
    </div>

    <div class="input-group">
        <label style="font-size: 0.85rem; font-weight: 800; display: block; margin-bottom: 8px;">키워드 입력</label>
        <input type="text" id="targetKeyword" placeholder="예: 대구 동성로 영어회화 내돈내산">
    </div>

    <button id="mainBtn" class="btn-run" onclick="generateContent()">새로운 원고 생성 🔥</button>
    <div id="status"></div>
</div>

<div class="main-content">
    <div class="editor-card">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom: 35px; border-bottom: 2px solid #f8f9fa; padding-bottom: 20px;">
            <h2 style="margin:0; font-weight:900; font-size:1.5rem;">✍️ 중복 없는 리얼 원고</h2>
            <button onclick="copyDraft()" style="background:#1a1a1b; color:white; border:none; padding:14px 28px; border-radius:14px; cursor:pointer; font-weight:800;">원고 전체 복사</button>
        </div>
        <div id="editor" contenteditable="true">
            매번 다른 각도(Angle)로 원고가 생성됩니다. <br>진부한 광고 멘트는 AI가 스스로 필터링합니다.
        </div>
    </div>
</div>

<script>
    const API_KEY = "AIzaSyBxiB6ZlvBDSyQwsftz_QzOkJ4E8IesAT4";
    let currentMode = 'thebox';

    function switchTab(mode) {
        currentMode = mode;
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        document.getElementById(mode === 'thebox' ? 'tabTheBox' : 'tabGeneral').classList.add('active');
        document.getElementById('mainBtn').style.background = mode === 'thebox' ? "#ff6b35" : "#03C75A";
    }

    async function requestAI(prompt) {
        const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${API_KEY}`;
        const response = await fetch(url, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ contents: [{ parts: [{ text: prompt }] }] })
        });
        const data = await response.json();
        return data.candidates[0].content.parts[0].text;
    }

    async function getKeywords() {
        const ideaList = document.getElementById('ideaList');
        ideaList.innerHTML = "새로운 아이디어 구상 중...";
        try {
            const res = await requestAI("2026년 3월 기준, 블로그에 썼을 때 유익하면서도 경쟁이 적은 대구 기반 혹은 자기계발 키워드 8개 추천해줘. 매번 다른 키워드를 제안해. 콤마로만 구분.");
            const kws = res.split(',');
            ideaList.innerHTML = "";
            kws.forEach(k => {
                const s = document.createElement('span');
                s.className = 'idea-tag';
                s.innerText = k.trim().replace(/[#\d.]/g, '');
                s.onclick = () => document.getElementById('targetKeyword').value = s.innerText;
                ideaList.appendChild(s);
            });
        } catch (e) { ideaList.innerHTML = "로드 실패"; }
    }

    async function generateContent() {
        const kw = document.getElementById('targetKeyword').value;
        const status = document.getElementById('status');
        const editor = document.getElementById('editor');

        if(!kw) return alert('키워드를 입력해 주세요!');

        status.style.display = 'block';
        status.style.background = '#eef2ff';
        status.style.color = '#4338ca';
        status.innerHTML = "🌀 <b>[진부함 필터링 가동]</b> 매번 다른 각도로 원고를 구성하는 중...";

        const prompt = `
        너는 2026년 네이버 블로그 생태계를 지배하는 '창의적인 파워블로거'야.
        절대 이전에 썼던 것 같은 뻔한 문장이나 구조를 반복하지 마.

        [특수 지침: Zero-Repetition]
        1. 도입부 혁신: "안녕하세요 오늘 소개할 곳은", "고민되시죠?" 같은 뻔한 오프닝 절대 금지.
        2. 랜덤 컨셉 적용: 아래 상황 중 하나를 무작위로 골라 빙의해서 써.
           - (A) 퇴근 후 동성로 핫플 찾다가 우연히 발견한 컨셉
           - (B) 몇 달 고민하다가 드디어 큰맘 먹고 등록한 리얼 후기 컨셉
           - (C) 영어 때문에 억울한 일 겪고 독기 품고 시작한 컨셉
           - (D) 동성로에서 외국인 친구 사귀고 싶어서 찾아간 설렘 컨셉
        3. 더박스(The Box) DB 활용: 중앙로역 위치, 원어민 리더와의 파티 감성, 아카데미 레벨제 등을 매번 다른 비중으로 섞어서 서술해.
        4. 네이버 기능 극대화: 인용구, 표, 링크 삽입 위치를 매번 다르게 배치해서 패턴화를 방지해.
        5. 분량: 2,000자 내외로 아주 상세하게. 가독성을 위해 엔터를 매우 자주 칠 것.

        키워드 [${kw}]를 활용한 새로운 원고를 ###원고 구분자 뒤에 작성해줘.
        `;

        try {
            const res = await requestAI(prompt);
            const content = res.split('###원고')[1] || res;
            
            let formatted = content.trim().replace(/\n/g, '<br>');
            formatted = formatted.replace(/> (.*?)(<br>|$)/g, '<div class="naver-quote">“$1”</div>');
            formatted = formatted.replace(/\[사진:.*?\]/g, m => `<div class="img-slot"><i class="fa-regular fa-image" style="font-size:2rem; display:block; margin-bottom:12px;"></i>${m}</div>`);
            
            editor.innerHTML = formatted;
            status.style.background = '#f0fdf4';
            status.style.color = '#15803d';
            status.innerHTML = "✅ 새로운 관점의 원고가 생성되었습니다! ✨";
        } catch (e) {
            status.style.background = '#fef2f2';
            status.style.color = '#b91c1c';
            status.innerHTML = `❌ 에러: ${e.message}`;
        }
    }

    function copyDraft() {
        const editor = document.getElementById('editor');
        const range = document.createRange();
        range.selectNode(editor);
        window.getSelection().removeAllRanges();
        window.getSelection().addRange(range);
        document.execCommand('copy');
        alert('원고 전체 복사 완료! ✨');
    }
</script>
</body>
</html>
